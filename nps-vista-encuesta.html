<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

<div class="nps-isolate-container">
  <div class="nps-container" >
    <div class="nps-title-container">
      <img src="img/logos/logo-salle.png" alt="">
      <img src="img/logos/lexium-goldmind-logo.png" alt="">
    </div>
    <div class="app-title-container">
      <div class="app-title">
        <h2 class="app-sec-title">Encuestas NPS -  "Nombre de la encuesta"</h2>
      </div>
    </div>
    <div class="app-wiz-mod">
      <div class="nps-encuesta-container">
        <div class="nps-encuesta-titulo">
          <h3>¿Qué tan probable es que recomiendes esta institución a un amigo o compañero?</h3>
        </div>

        <div class="nps-rate-container">
          <button class="nps-rate-box" data-value="0"><span>0</span></button>
          <button class="nps-rate-box" data-value="1"><span>1</span></button>
          <button class="nps-rate-box" data-value="2"><span>2</span></button>
          <button class="nps-rate-box" data-value="3"><span>3</span></button>
          <button class="nps-rate-box" data-value="4"><span>4</span></button>
          <button class="nps-rate-box" data-value="5"><span>5</span></button>
          <button class="nps-rate-box" data-value="6"><span>6</span></button>
          <button class="nps-rate-box" data-value="7"><span>7</span></button>
          <button class="nps-rate-box" data-value="8"><span>8</span></button>
          <button class="nps-rate-box" data-value="9"><span>9</span></button>
          <button class="nps-rate-box" data-value="10"><span>10</span></button>
        </div>
        <div class="nps-range-line">
          <div class="nps-range-line-track"></div>
          <div class="nps-range-values">
            <span class="nps-range-label">Nada probable</span>
            <span class="nps-range-label">Muy probable</span>
          </div>
        </div>
      </div>

    </div>
    <div class="app-wiz-con-sub">
      <p class="app-wiz-subtitle">¿Qué podemos hacer para mejorar tu experiencia?</p>
      <div class="app-input">
        <textarea id="questionTextarea" placeholder="Escribe tu respuesta aquí..."></textarea>
      </div>
    </div>
    <div class="app-btn-gp-frame">
      <div class="app-btn-gp-container">
        <button class="app-btn-o">ENVIAR</button>
      </div>
    </div>
    <script src="js/nps-rango.js"></script>
    
  </div>
</div>
<div class="nps-isolate-container">
  <div class="nps-container" >
    <div class="nps-title-container">
      <img src="img/logos/logo-salle.png" alt="">
      <img src="img/logos/lexium-goldmind-logo.png" alt="">
    </div>
    <div class="nps-sub-container">
      
        <h2>¡GRACIAS POR SU PARTICIPACIÓN!</h2>
      
    </div>


  </div>
</div>

  


</body>

</script>
